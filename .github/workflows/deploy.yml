name: Deploy to EC2

on:
  push:
    branches:
      - main
  # Optional manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to production EC2 instance
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # The shell script is highly idempotent and handles graceful restarting/setup natively.
          bash ~/zenvy/scripts/deploy.sh
