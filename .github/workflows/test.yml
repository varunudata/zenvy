name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Unit Tests (Vitest)
        run: npx vitest run --reporter=html --outputFile=html/index.html

      - name: Upload Vitest Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: client/html/
          retention-days: 14

      - name: Run Integration/E2E Tests (Playwright)
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests (Jest)
        run: npx jest --reporters=default --reporters=jest-html-reporter
        env:
          JEST_HTML_REPORTER_OUTPUT_PATH: ./test-report.html

      - name: Upload Jest Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-report
          path: server/test-report.html
          retention-days: 14
