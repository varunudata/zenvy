version: '3.8'

services:
  # The Backend Node.js Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zenvy-server
    ports:
      - "4004:4004"
      - "4007:4007"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - zenvy-network

  # The Frontend Next.js Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zenvy-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Depending on how the client hits the server, point it to the backend container
      - NEXT_PUBLIC_API_URL=http://server:4004
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - zenvy-network

networks:
  zenvy-network:
    driver: bridge
